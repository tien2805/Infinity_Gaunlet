<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY GAUNTLET - JARVIS HUD</title>
    <!-- Web Bluetooth API - Không cần thư viện bên ngoài -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050505;
            --neon-cyan: #00E5FF;
            --neon-orange: #FF9900;
            --neon-red: #FF2A00;
            --neon-purple: #B026FF;
            --text-main: #FFFFFF;
            --panel-bg: rgba(0, 229, 255, 0.05);
            --panel-border: rgba(0, 229, 255, 0.3);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* --- HEADER & CONNECTION --- */
        header {
            text-align: center;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .connection-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 15px;
            font-family: 'Orbitron', monospace;
            border-radius: 4px;
            outline: none;
        }

        button.btn-connect {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        button.btn-connect:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        #status-msg {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }

        /* --- MAIN LAYOUT --- */
        .dashboard {
            display: flex;
            flex: 1;
            gap: 20px;
            /* Update to row to match reference image side-by-side */
            flex-direction: row;
        }

        .panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* --- SENSOR DATA --- */
        .sensor-row {
            margin-bottom: 25px;
        }

        .sensor-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .sensor-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 28px;
            font-weight: bold;
        }

        .state-straight {
            color: #fff;
            text-shadow: 0 0 5px #00FF00, 0 0 10px #00FF00, 0 0 20px #00FF00;
        }

        .state-bent {
            color: #fff;
            text-shadow: 0 0 5px var(--neon-orange), 0 0 10px var(--neon-orange), 0 0 20px var(--neon-orange);
        }

        /* --- TYPING MODE UI --- */
        .typing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            position: relative;
        }

        #mode-indicator {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .mode-active {
            color: var(--neon-purple) !important;
            text-shadow: 0 0 20px var(--neon-purple);
            animation: pulse 1.5s infinite;
        }

        #hold-feedback {
            color: var(--neon-orange);
            font-size: 14px;
            height: 20px;
            margin-bottom: 15px;
        }

        #selected-letter {
            font-family: 'Share Tech Mono', monospace;
            font-size: 80px;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 0 2px var(--neon-cyan);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: 0.2s;
            position: relative;
        }

        #selected-letter::before,
        #selected-letter::after {
            content: '';
            position: absolute;
            width: 17px;
            height: 17px;
            border: 4px solid var(--neon-cyan);
            transition: 0.2s;
        }

        #selected-letter::before {
            top: -6px;
            left: -6px;
            border-right: none;
            border-bottom: none;
        }

        #selected-letter::after {
            bottom: -6px;
            right: -6px;
            border-left: none;
            border-top: none;
        }

        .letter-active {
            color: var(--neon-cyan) !important;
            text-shadow: 0 0 20px var(--neon-cyan) !important;
            box-shadow: inset 0 0 40px rgba(0, 229, 255, 0.4), 0 0 0 2px var(--neon-cyan) !important;
        }

        #text-output {
            width: 100%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-purple);
            color: var(--text-main);
            padding: 15px;
            font-size: 20px;
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box;
            border-radius: 5px;
            word-wrap: break-word;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }



        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            #selected-letter {
                font-size: 60px;
                width: 100px;
                height: 100px;
            }
        }

        /* --- VIRTUAL CURSOR & EFFECTS --- */
        #virtual-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 25px;
            height: 25px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            pointer-events: none;
            z-index: 9999;
            display: none;
            /* Hidden by default */
            will-change: transform;
        }

        #virtual-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .click-ripple {
            position: fixed;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            animation: ripple-out 0.6s ease-out forwards;
        }

        @keyframes ripple-out {
            0% {
                width: 0;
                height: 0;
                border: 2px solid currentColor;
                opacity: 1;
            }

            100% {
                width: 100px;
                height: 100px;
                border: 1px solid currentColor;
                opacity: 0;
            }
        }

        #snap-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10000;
        }

        .snap-active {
            animation: snap-flash 1s ease-out forwards;
        }

        @keyframes snap-flash {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes dustDisintegrate {
            0% {
                filter: blur(0px);
                opacity: 1;
                transform: scale(1) translate(0, 0);
            }

            40% {
                filter: blur(8px) sepia(60%) hue-rotate(-10deg) saturate(300%) brightness(1.2);
                opacity: 0.6;
                transform: scale(1.02) translate(-10px, -15px);
            }

            100% {
                filter: blur(20px) sepia(80%) hue-rotate(-20deg) saturate(400%) brightness(0.5);
                opacity: 0;
                transform: scale(1.05) translate(-30px, -40px);
            }
        }

        .thanos-snapping {
            animation: dustDisintegrate 4s ease-in forwards;
            pointer-events: none;
        }

        @keyframes showEndGame {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .end-game-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            letter-spacing: 20px;
            z-index: 10000;
            opacity: 0;
            animation: showEndGame 3s ease-in forwards;
            pointer-events: auto;
            /* Lock interactions */
        }

        .end-game-subtext {
            font-size: 1.2rem;
            color: #555;
            letter-spacing: 8px;
            margin-top: 20px;
        }

        /* --- OFFLINE STATE --- */
        body.offline .dashboard {
            opacity: 0.05;
            pointer-events: none;
            filter: grayscale(1) brightness(0.2);
            transition: backgound 0.5s, opacity 0.5s;
        }

        /* --- BOOTUP ANIMATION --- */
        body.booting .dashboard {
            animation: bootUpDash 2.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            pointer-events: auto;
            transform-origin: center;
        }

        body.booting::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.8) 0%, transparent 70%);
            z-index: 9999;
            pointer-events: none;
            mix-blend-mode: screen;
            animation: systemFlash 2.5s forwards;
        }

        body.booting::after {
            content: '';
            position: fixed;
            top: -10%; left: 0; width: 100vw; height: 4px;
            background: #fff;
            box-shadow: 0 0 20px 5px var(--neon-cyan), 0 0 40px 10px var(--neon-cyan);
            z-index: 10000;
            pointer-events: none;
            animation: systemScan 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes systemScan {
            0% { top: -10%; opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        @keyframes systemFlash {
            0%, 20% { opacity: 0; transform: scale(0.5); }
            30% { opacity: 1; transform: scale(1.2); }
            50% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0; }
        }

        @keyframes bootUpDash {
            0% { 
                opacity: 0; filter: grayscale(1) brightness(0) blur(20px); 
                transform: scale(0.8) translateY(100px); 
            }
            20% { 
                opacity: 0.2; filter: grayscale(0.8) brightness(0.5) blur(10px); 
                transform: scale(0.9) translateY(20px); 
            }
            25% { 
                opacity: 0.05; filter: grayscale(1) brightness(0) blur(15px); 
            }
            30% { 
                /* BOOM / POWER SURGE */
                opacity: 1; filter: grayscale(0) brightness(2.5) drop-shadow(0 0 100px var(--neon-cyan)) contrast(1.5) blur(0px); 
                transform: scale(1.05) translateY(-5px); 
            }
            50% { 
                opacity: 1; filter: grayscale(0) brightness(1.2) drop-shadow(0 0 30px var(--neon-cyan)); 
                transform: scale(1.01) translateY(0); 
            }
            100% { 
                opacity: 1; filter: grayscale(0) brightness(1) drop-shadow(0 0 0px transparent); 
                transform: scale(1); 
            }
        }
    </style>
</head>

<body class="offline">
    <div id="virtual-cursor"></div>
    <div id="snap-overlay"></div>
    <header>
        <h1>INFINITY // COMMAND CENTER</h1>
        <div class="connection-bar">
            <button class="btn-connect" id="btn-ble" onclick="connectBLE()">CONNECT VIA BLUETOOTH</button>
            <button class="btn-connect" id="btn-disconnect" onclick="disconnectBLE()"
                style="display:none; border-color: var(--neon-red); color: var(--neon-red);">DISCONNECT</button>
        </div>
        <div id="status-msg">SYSTEM OFFLINE. CLICK CONNECT TO PAIR VIA BLUETOOTH.</div>
    </header>

    <div class="dashboard">

        <div class="panel">
            <div class="panel-title">BIOMETRIC SENSORS</div>

            <div class="sensor-row">
                <div class="sensor-label">FLEX 1 (INDEX FINGER)</div>
                <div id="val-flex1" class="sensor-val state-straight">STRAIGHT</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">FLEX 2 (MIDDLE FINGER)</div>
                <div id="val-flex2" class="sensor-val state-straight">STRAIGHT</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">PITCH ANGLE (UP/DOWN)</div>
                <div id="val-pitch" class="sensor-val" style="color: var(--neon-cyan);">0°</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">ROLL ANGLE (NAVIGATE)</div>
                <div id="val-roll" class="sensor-val" style="color: var(--neon-cyan);">0°</div>
            </div>
        </div>
        <div class="panel">
            <div class="panel-title">VIRTUAL TERMINAL</div>

            <div class="typing-container">
                <div id="mode-indicator">TYPING MODE: OFF</div>
                <div id="hold-feedback"></div>

                <div id="selected-letter">_</div>

                <div style="width: 100%; margin-bottom: 5px; color: #888; font-size: 12px;">INCOMING TRANSMISSION:</div>
                <div id="text-output"></div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // CẤU HÌNH BLE (Web Bluetooth API)
        // UUID phải khớp với INFINITYGAUNLET.ino
        // ==========================================
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

        let bleDevice = null;
        let bleCharacteristic = null;

        // --- BIẾN LOGIC MODE ---
        let currentMode = 0; // 0: OFF, 1: TYPING, 2: CURSOR
        const MODES = ["OFF", "TYPING", "CURSOR"];

        // Cursor Logic
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;
        const CURSOR_SENSITIVITY = 3.0; // Giống promouse.ino
        const DEAD_ZONE = 3.0;

        // --- CURSOR SMOOTHING (tách riêng khỏi BLE callback) ---
        let targetCursorRoll = 0;   // Giá trị thô từ BLE
        let targetCursorPitch = 0;
        let smoothCursorRoll = 0;   // Giá trị đã smooth riêng cho cursor
        let smoothCursorPitch = 0;

        // Timer Logic
        let isHolding = false;
        let holdStartTime = 0;
        let cooldownUntil = 0;
        let lastClickTime = 0;

        // Keystroke Logic
        let currentLetter = 'A';
        let currentLetterIdx = 0;
        let lastTypeTime = 0;
        let lastLetterChangeTime = 0;
        let canChangeLetter = true;
        let canTypeLetter = true;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ_";

        // --- TWEENING (HIỆU ỨNG MƯỢT SỐ DI CHUYỂN) ---
        let currentRoll = 0, currentPitch = 0; // Giá trị đang hiển thị trên Web
        let targetRoll = 0, targetPitch = 0;   // Giá trị thực tế nhận từ ESP32

        function animateNumbers() {
            // Toán học nội suy Lerp (Cộng dần 10% khoảng cách mỗi khung hình)
            currentRoll += (targetRoll - currentRoll) * 0.10;
            currentPitch += (targetPitch - currentPitch) * 0.10;

            // Đã đổi chỗ Pitch và Roll theo yêu cầu để khớp với Web UI
            let pEl = document.getElementById("val-pitch");
            let rEl = document.getElementById("val-roll");
            if (pEl) pEl.innerText = currentPitch.toFixed(1) + "°";
            if (rEl) rEl.innerText = currentRoll.toFixed(1) + "°";

            requestAnimationFrame(animateNumbers);
        }

        // --- VONG LAP CURSOR 60FPS (tach rieng khoi BLE) ---
        const cursorDomEl = document.getElementById('virtual-cursor');
        function animateCursor() {
            if (currentMode === 2) {
                // Lerp rieng cho cursor (alpha=0.25)
                smoothCursorRoll += (targetCursorRoll - smoothCursorRoll) * 0.25;
                smoothCursorPitch += (targetCursorPitch - smoothCursorPitch) * 0.25;

                // Tinh moveX/moveY giong promouse.ino
                let moveX = 0;
                let moveY = 0;

                if (Math.abs(smoothCursorRoll) > DEAD_ZONE) {
                    moveX = Math.max(-127, Math.min(127, smoothCursorRoll * CURSOR_SENSITIVITY / 10.0));
                }
                if (Math.abs(smoothCursorPitch) > DEAD_ZONE) {
                    moveY = Math.max(-127, Math.min(127, -smoothCursorPitch * CURSOR_SENSITIVITY / 10.0));
                }

                cursorX += moveX;
                cursorY += moveY;

                cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
                cursorY = Math.max(0, Math.min(window.innerHeight, cursorY));

                cursorDomEl.style.transform = `translate(${cursorX - 12.5}px, ${cursorY - 12.5}px)`;
            }
            requestAnimationFrame(animateCursor);
        }

        // Khởi động cả 2 vòng lặp hiệu ứng
        animateNumbers();
        animateCursor();

        // ==========================================
        // KẾT NỐI BLE - LẦN ĐẦU (Cần bấm nút)
        // ==========================================
        async function connectBLE() {
            try {
                const statusEl = document.getElementById('status-msg');
                statusEl.innerText = 'SCANNING FOR BLUETOOTH DEVICES...';
                statusEl.style.color = '#FF9900';
                // Yêu cầu người dùng chọn thiết bị (chỉ cần 1 lần duy nhất)
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }],
                    optionalServices: [SERVICE_UUID]
                });

                // Sau khi chọn xong, kết nối
                await finishConnection(bleDevice);

            } catch (error) {
                const statusEl = document.getElementById('status-msg');
                if (error.name === 'NotFoundError') {
                    statusEl.innerText = 'NO DEVICE SELECTED. TRY AGAIN.';
                } else {
                    statusEl.innerText = 'CONNECTION FAILED: ' + error.message;
                }
                statusEl.style.color = 'red';
                console.error('BLE Error:', error);
            }
        }

        // ==========================================
        // HÀM KẾT NỐI CHUNG (dùng cho cả lần đầu và auto-reconnect)
        // ==========================================
        let autoReconnectTimer = null;

        async function finishConnection(device) {
            const statusEl = document.getElementById('status-msg');

            // Lắng nghe sự kiện ngắt kết nối
            device.addEventListener('gattserverdisconnected', onDisconnected);

            statusEl.innerText = 'CONNECTING TO ' + (device.name || 'ESP32') + '...';
            statusEl.style.color = '#FF9900';

            // Kết nối GATT Server
            const server = await device.gatt.connect();

            // Lấy Service + Characteristic
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            // Bật Notifications
            await bleCharacteristic.startNotifications();
            bleCharacteristic.addEventListener('characteristicvaluechanged', onBLEData);

            // Cập nhật UI
            statusEl.innerText = 'SYSTEM ONLINE — CONNECTED VIA BLUETOOTH (' + (device.name || 'ESP32') + ')';
            statusEl.style.color = '#00FF00';
            document.getElementById('btn-ble').style.display = 'none';
            document.getElementById('btn-disconnect').style.display = 'inline-block';

            // Dừng auto-reconnect nếu đang chạy
            if (autoReconnectTimer) {
                clearInterval(autoReconnectTimer);
                autoReconnectTimer = null;
            }

            console.log('BLE Connected to:', device.name);

            // Bật hiệu ứng khởi động GUI bằng CSS class
            document.body.className = 'booting';

            // Tự dọn dẹp class booting sau 2.5s
            setTimeout(() => {
                document.body.className = '';
            }, 2500);

            // Bật hiệu ứng âm thanh khi kết nối thành công mượt mà
            let connectAudio = new Audio('connect.mp3');
            connectAudio.volume = 0;
            connectAudio.play().catch(err => console.log("Audio play err:", err));
            
            // Fade-in trong vài giây đầu
            let fadeIn = setInterval(() => {
                if (connectAudio.volume < 0.95) {
                    connectAudio.volume += 0.05;
                } else {
                    connectAudio.volume = 1.0;
                    clearInterval(fadeIn);
                }
            }, 50);

            // Tắt nhạc sau 4 giây (fade out)
            setTimeout(() => {
                let fadeConnect = setInterval(() => {
                    if (connectAudio.volume > 0.05) {
                        connectAudio.volume -= 0.05;
                    } else {
                        connectAudio.pause();
                        clearInterval(fadeConnect);
                    }
                }, 50);
            }, 4000);
        }

        // ==========================================
        // TỰ ĐỘNG KẾT NỐI LẠI (Auto-Reconnect)
        // Dùng getDevices() để tìm thiết bị đã pair trước đó
        // ==========================================
        async function autoReconnect() {
            const statusEl = document.getElementById('status-msg');

            // Kiểm tra trình duyệt có hỗ trợ getDevices() không
            if (!navigator.bluetooth || !navigator.bluetooth.getDevices) {
                console.log('getDevices() not supported. Manual connect required.');
                return false;
            }

            try {
                // Lấy danh sách thiết bị đã pair trước đó
                const devices = await navigator.bluetooth.getDevices();
                console.log('Previously paired devices:', devices.length);

                for (const device of devices) {
                    console.log('Found paired device:', device.name, device.id);

                    // Thử kết nối lại
                    try {
                        statusEl.innerText = 'AUTO-RECONNECTING TO ' + (device.name || 'ESP32') + '...';
                        statusEl.style.color = '#FF9900';

                        bleDevice = device;
                        await finishConnection(device);
                        return true; // Kết nối thành công!
                    } catch (err) {
                        console.log('Auto-reconnect failed for', device.name, ':', err.message);
                    }
                }
            } catch (err) {
                console.log('Auto-reconnect error:', err.message);
            }

            return false; // Không kết nối được
        }

        // ==========================================
        // NGẮT KẾT NỐI BLE
        // ==========================================
        function disconnectBLE() {
            // Dừng auto-reconnect
            if (autoReconnectTimer) {
                clearInterval(autoReconnectTimer);
                autoReconnectTimer = null;
            }
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            }
        }

        function onDisconnected() {
            document.body.className = 'offline';
            const statusEl = document.getElementById('status-msg');
            statusEl.innerText = 'BLUETOOTH DISCONNECTED. AUTO-RECONNECTING...';
            statusEl.style.color = '#FF9900';
            document.getElementById('btn-ble').style.display = 'inline-block';
            document.getElementById('btn-disconnect').style.display = 'none';
            bleCharacteristic = null;
            console.log('BLE Disconnected. Starting auto-reconnect...');

            // Tự động thử kết nối lại mỗi 3 giây
            if (!autoReconnectTimer) {
                autoReconnectTimer = setInterval(async () => {
                    console.log('Attempting auto-reconnect...');
                    const success = await autoReconnect();
                    if (success) {
                        clearInterval(autoReconnectTimer);
                        autoReconnectTimer = null;
                    }
                }, 3000);
            }
        }

        // ==========================================
        // KHI TRANG WEB LOAD → TỰ ĐỘNG TÌM VÀ KẾT NỐI
        // ==========================================
        window.addEventListener('load', async () => {
            const statusEl = document.getElementById('status-msg');
            statusEl.innerText = 'SEARCHING FOR PREVIOUSLY PAIRED DEVICE...';
            statusEl.style.color = '#FF9900';

            const success = await autoReconnect();
            if (!success) {
                statusEl.innerText = 'NO PAIRED DEVICE FOUND. CLICK CONNECT TO PAIR FOR THE FIRST TIME.';
                statusEl.style.color = '#888';
            }
        });

        // ==========================================
        // NHẬN DỮ LIỆU TỪ BLE
        // ==========================================
        function onBLEData(event) {
            let jsonString = '';
            try {
                const decoder = new TextDecoder('utf-8');
                jsonString = decoder.decode(event.target.value);
                console.log('BLE RAW:', jsonString);

                const payload = JSON.parse(jsonString);

                // Xu ly Snap
                if (payload.snap === true) {
                    triggerSnapEffect();
                }

                processSensors(payload);
            } catch (e) {
                console.error('BLE parse error:', e, '| raw:', jsonString);
            }
        }

        function triggerSnapEffect() {
            // Ngăn chặn chạy nhiều lần
            if (document.body.classList.contains("snap-triggered")) return;
            document.body.classList.add("snap-triggered");

            console.log("SNAP EFFECT TRIGGERED!");

            // Sử dụng file cục bộ vì đã được đưa lên cùng thư mục
            let bgmAudio = new Audio('endgame.mp3');

            // Xử lý nhạc Fade In từ 0 lên 0.6 trong 2 giây đầu
            bgmAudio.volume = 0;
            bgmAudio.play().catch(err => console.log("Audio play err:", err));

            let fadeIn = setInterval(() => {
                if (bgmAudio.volume < 0.55) {
                    bgmAudio.volume += 0.05;
                } else {
                    bgmAudio.volume = 0.6;
                    clearInterval(fadeIn);
                }
            }, 150);

            // Dừng nhạc nền sau đúng 10 giây kể từ lúc búng tay (bắt đầu fade out ở giây 9)
            setTimeout(() => {
                let fadeAudio = setInterval(() => {
                    if (bgmAudio.volume > 0.05) {
                        bgmAudio.volume -= 0.05;
                    } else {
                        bgmAudio.pause();
                        clearInterval(fadeAudio);
                    }
                }, 100);
            }, 9000);

            const overlay = document.getElementById('snap-overlay');
            overlay.classList.remove('snap-active');
            void overlay.offsetWidth; // Trigger reflow
            overlay.classList.add('snap-active');

            // Hiệu ứng tan thành cát bụi cho toàn bộ nội dung (header, dashboard, cursor)
            document.querySelectorAll("header, .dashboard, #virtual-cursor").forEach(el => {
                el.classList.add("thanos-snapping");
            });

            // Hiển thị màn hình "END GAME" sau khi hòa tan (chờ 4 giây)
            setTimeout(() => {
                let endGame = document.createElement("div");
                endGame.className = "end-game-screen";
                endGame.innerHTML = `
                    <div>END GAME</div>
                    <div class="end-game-subtext">THANKS FOR YOUR ATTENTION</div>
                `;
                document.body.appendChild(endGame);

                // Cắt phần tử hỏng khỏi RAM
                setTimeout(() => {
                    document.querySelectorAll("header, .dashboard, #virtual-cursor").forEach(el => el.remove());
                }, 1000);
            }, 4000);
        }

        // --- HÀM XỬ LÝ LÕI (CORE LOGIC) ---
        function processSensors(data) {
            const flex1 = data.flex1 ?? "STRAIGHT";
            const flex2 = data.flex2 ?? "STRAIGHT";
            const roll = (data.roll !== undefined && data.roll !== null) ? Number(data.roll) : 0;
            const pitch = (data.pitch !== undefined && data.pitch !== null) ? Number(data.pitch) : 0;

            const f1Bent = (flex1 === "BENT");
            const f2Bent = (flex2 === "BENT");

            // 1. Cap nhat UI Cam bien
            updateSensorUI("val-flex1", f1Bent);
            updateSensorUI("val-flex2", f2Bent);

            // Gan target de vong lap animateNumbers tu dong chay den
            targetRoll = roll;
            targetPitch = pitch;

            // 2. Logic "Hold 3 Seconds" để Bật/Tắt Typing Mode
            const now = Date.now();

            if (f1Bent && f2Bent) {
                if (now > cooldownUntil) {
                    if (!isHolding) {
                        isHolding = true;
                        holdStartTime = now;
                    }

                    let holdDuration = now - holdStartTime;

                    if (holdDuration >= 3000) {
                        cycleMode(); // Đổi từ toggle sang cycle
                        isHolding = false;
                        document.getElementById("hold-feedback").innerText = "MODE SWITCHED!";
                        cooldownUntil = now + 2000;
                    } else {
                        document.getElementById("hold-feedback").innerText = `HOLDING TO TOGGLE... ${(holdDuration / 1000).toFixed(1)}s / 3.0s`;
                    }
                }
            } else {
                if (isHolding) {
                    isHolding = false;
                    document.getElementById("hold-feedback").innerText = "HOLD CANCELED";
                    setTimeout(() => {
                        if (!isHolding) document.getElementById("hold-feedback").innerText = "";
                    }, 1000);
                }
            }

            // 3. Logic Đánh chữ (Chỉ chạy khi Typing Mode bật)
            if (currentMode === 1) { // TYPING MODE
                // Reset cờ gạt chữ nếu tay về lại góc < 30 độ
                if (Math.abs(currentRoll) < 30) {
                    canChangeLetter = true;
                }

                // Chuyển 1 chữ duy nhất mỗi lần vặn tay qua 30 độ
                if (canChangeLetter) {
                    if (currentRoll > 30) {
                        currentLetterIdx++;
                        if (currentLetterIdx >= alphabet.length) currentLetterIdx = 0;
                        canChangeLetter = false;
                    } else if (currentRoll < -30) {
                        currentLetterIdx--;
                        if (currentLetterIdx < 0) currentLetterIdx = alphabet.length - 1;
                        canChangeLetter = false;
                    }
                }

                currentLetter = alphabet[currentLetterIdx];
                document.getElementById("selected-letter").innerText = currentLetter;

                if (!f1Bent && !f2Bent) {
                    canTypeLetter = true;
                }

                // Nhập ký tự khi gập ngón 1 HOẶC ngón 2 (tránh gập cả 2 vì đó là đổi mode)
                if (canTypeLetter && (f1Bent || f2Bent) && (f1Bent !== f2Bent)) {
                    canTypeLetter = false; // Khóa lại, bắt buộc thả thẳng tay mới gõ được tiếp
                    
                    let outBox = document.getElementById("text-output");
                    let letterToAdd = currentLetter === '_' ? ' ' : currentLetter;
                    outBox.innerText += letterToAdd;

                    document.getElementById("selected-letter").style.transform = "scale(0.8)";
                    setTimeout(() => {
                        document.getElementById("selected-letter").style.transform = "scale(1)";
                    }, 100);
                }
            }

            // 4. Logic Chuột ảo (Chỉ chạy khi Cursor Mode bật)
            if (currentMode === 2) { // CURSOR MODE
                // Chỉ cập nhật target góc — animateCursor() sẽ xử lý di chuyển mượt ở 60FPS
                targetCursorRoll = roll;
                targetCursorPitch = pitch;

                // Logic Click (giữ nguyên trong BLE callback vì cần phản hồi tức thì)
                if (now - lastClickTime > 500) {
                    if (f1Bent && !f2Bent) { // Left Click
                        createRipple(cursorX, cursorY, 'var(--neon-cyan)');
                        lastClickTime = now;
                        console.log("LEFT CLICK");
                    } else if (f2Bent && !f1Bent) { // Right Click
                        createRipple(cursorX, cursorY, 'var(--neon-orange)');
                        lastClickTime = now;
                        console.log("RIGHT CLICK");
                    }
                }
            }
        }

        function createRipple(x, y, color) {
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.color = color;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Cập nhật đổi màu trạng thái Flex
        function updateSensorUI(elementId, isBent) {
            let el = document.getElementById(elementId);
            if (isBent) {
                el.innerText = "BENT";
                el.className = "sensor-val state-bent";
            } else {
                el.innerText = "STRAIGHT";
                el.className = "sensor-val state-straight";
            }
        }

        function cycleMode() {
            currentMode = (currentMode + 1) % 3;

            let indicator = document.getElementById("mode-indicator");
            let letterBox = document.getElementById("selected-letter");
            let cursorEl = document.getElementById("virtual-cursor");

            indicator.innerText = "MODE: " + MODES[currentMode];

            // Reset UI states
            indicator.className = "";
            letterBox.className = "";
            cursorEl.style.display = "none";

            if (currentMode === 1) { // TYPING
                indicator.className = "mode-active";
                letterBox.className = "letter-active";

                // Trở về chữ A khi bắt đầu Typing Mode
                currentLetterIdx = 0;
                currentLetter = alphabet[currentLetterIdx];
                letterBox.innerText = currentLetter;
            } else if (currentMode === 2) { // CURSOR
                indicator.className = "mode-active";
                indicator.style.color = "var(--neon-orange)";
                cursorEl.style.display = "block";
                // Reset cursor về giữa màn hình khi bật
                cursorX = window.innerWidth / 2;
                cursorY = window.innerHeight / 2;
                // Reset smooth values để tránh nhảy
                smoothCursorRoll = 0;
                smoothCursorPitch = 0;
                targetCursorRoll = 0;
                targetCursorPitch = 0;
            } else {
                letterBox.innerText = "_";
            }
        }

        // Phím tắt - Bấm phím Delete (Del) hoặc Backspace để kích hoạt Thanos Snap
        window.addEventListener('keydown', function (event) {
            console.log("Phím vừa bấm: " + event.key + " - Mã code: " + event.code);
            // Hỗ trợ cả phím Delete và Backspace (vì một số laptop Mac/Windows bị lộn 2 phím này)
            if (event.code === 'Delete' || event.key === 'Delete' || event.code === 'Backspace' || event.key === 'Backspace') {
                event.preventDefault();
                triggerSnapEffect();
            }
        });

    </script>
