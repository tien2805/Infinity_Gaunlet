<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY GAUNTLET - JARVIS HUD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050505;
            --neon-cyan: #00E5FF;
            --neon-orange: #FF9900;
            --neon-red: #FF2A00;
            --neon-purple: #B026FF;
            --text-main: #FFFFFF;
            --panel-bg: rgba(0, 229, 255, 0.05);
            --panel-border: rgba(0, 229, 255, 0.3);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* --- HEADER & CONNECTION --- */
        header {
            text-align: center;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .connection-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 8px 15px;
            font-family: 'Orbitron', monospace;
            border-radius: 4px;
            outline: none;
        }

        button.btn-connect {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        button.btn-connect:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        #status-msg {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }

        /* --- MAIN LAYOUT --- */
        .dashboard {
            display: flex;
            flex: 1;
            gap: 20px;
        }

        .panel {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* --- SENSOR DATA --- */
        .sensor-row {
            margin-bottom: 25px;
        }

        .sensor-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .sensor-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 28px;
            font-weight: bold;
        }

        .state-straight {
            color: #fff;
            text-shadow: 0 0 5px #00FF00, 0 0 10px #00FF00, 0 0 20px #00FF00;
        }

        .state-bent {
            color: #fff;
            text-shadow: 0 0 5px var(--neon-orange), 0 0 10px var(--neon-orange), 0 0 20px var(--neon-orange);
        }

        /* --- TYPING MODE UI --- */
        .typing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            position: relative;
        }

        #mode-indicator {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .mode-active {
            color: var(--neon-purple) !important;
            text-shadow: 0 0 20px var(--neon-purple);
            animation: pulse 1.5s infinite;
        }

        #hold-feedback {
            color: var(--neon-orange);
            font-size: 14px;
            height: 20px;
            margin-bottom: 15px;
        }

        #selected-letter {
            font-family: 'Share Tech Mono', monospace;
            font-size: 80px;
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 0 2px var(--neon-cyan);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            transition: 0.2s;
            position: relative;
        }

        #selected-letter::before,
        #selected-letter::after {
            content: '';
            position: absolute;
            width: 17px;
            height: 17px;
            border: 4px solid var(--neon-cyan);
            transition: 0.2s;
        }

        #selected-letter::before {
            top: -6px;
            left: -6px;
            border-right: none;
            border-bottom: none;
        }

        #selected-letter::after {
            bottom: -6px;
            right: -6px;
            border-left: none;
            border-top: none;
        }

        .letter-active {
            color: var(--neon-cyan) !important;
            text-shadow: 0 0 20px var(--neon-cyan) !important;
            box-shadow: inset 0 0 40px rgba(0, 229, 255, 0.4), 0 0 0 2px var(--neon-cyan) !important;
        }

        #text-output {
            width: 100%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-purple);
            color: var(--text-main);
            padding: 15px;
            font-size: 20px;
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box;
            border-radius: 5px;
            word-wrap: break-word;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            #selected-letter {
                font-size: 60px;
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>INFINITY // COMMAND CENTER</h1>
        <div class="connection-bar">
            <input type="text" id="mqtt-host" value="broker.hivemq.com" placeholder="Broker Host">
            <input type="number" id="mqtt-port" value="8884" placeholder="Port (Default 8884)" style="width: 100px;">
            <button class="btn-connect" onclick="connectMQTT()">CONNECT SYSTEM</button>
        </div>
        <div id="status-msg">SYSTEM OFFLINE. CLICK CONNECT TO START.</div>
    </header>

    <div class="dashboard">

        <div class="panel">
            <div class="panel-title">BIOMETRIC SENSORS</div>

            <div class="sensor-row">
                <div class="sensor-label">FLEX 1 (INDEX FINGER)</div>
                <div id="val-flex1" class="sensor-val state-straight">STRAIGHT</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">FLEX 2 (MIDDLE FINGER)</div>
                <div id="val-flex2" class="sensor-val state-straight">STRAIGHT</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">ROLL ANGLE (NAVIGATE)</div>
                <div id="val-roll" class="sensor-val" style="color: var(--neon-cyan);">0°</div>
            </div>

            <div class="sensor-row">
                <div class="sensor-label">PITCH ANGLE</div>
                <div id="val-pitch" class="sensor-val" style="color: var(--neon-cyan);">0°</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">VIRTUAL TERMINAL</div>

            <div class="typing-container">
                <div id="mode-indicator">TYPING MODE: OFF</div>
                <div id="hold-feedback"></div>

                <div id="selected-letter">_</div>

                <div style="width: 100%; margin-bottom: 5px; color: #888; font-size: 12px;">INCOMING TRANSMISSION:</div>
                <div id="text-output"></div>
            </div>
        </div>

    </div>

    <script>
        // --- CẤU HÌNH MQTT ---
        let client;
        const topicSub = "infinity/gauntlet/sensors"; // Fixed topic to match ESP32
        // const flexThreshold = 3000; // ESP32 already converts this to 'BENT'/'STRAIGHT'

        // --- BIẾN LOGIC TYPING MODE ---
        let isTypingMode = false;

        // Timer Logic
        let isHolding = false;
        let holdStartTime = 0;
        let cooldownUntil = 0;

        // Keystroke Logic
        let currentLetter = 'A';
        let lastTypeTime = 0;
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ_";

        // --- TWEENING (HIỆU ỨNG MƯỢT SỐ DI CHUYỂN) ---
        let currentRoll = 0, currentPitch = 0; // Giá trị đang hiển thị trên Web
        let targetRoll = 0, targetPitch = 0;   // Giá trị thực tế nhận từ ESP32

        function animateNumbers() {
            // Toán học nội suy Lerp (Cộng dần 15% khoảng cách mỗi khung hình)
            currentRoll += (targetRoll - currentRoll) * 0.15;
            currentPitch += (targetPitch - currentPitch) * 0.15;

            // Update UI cho Roll & Pitch
            document.getElementById("val-roll").innerText = Math.round(currentRoll) + "°";
            document.getElementById("val-pitch").innerText = Math.round(currentPitch) + "°";

            requestAnimationFrame(animateNumbers);
        }

        // Khởi động vòng lặp hiệu ứng hình ảnh
        animateNumbers();

        function connectMQTT() {
            const host = document.getElementById("mqtt-host").value;
            const port = parseInt(document.getElementById("mqtt-port").value);
            const clientId = "infinity_web_" + Math.floor(Math.random() * 10000);

            document.getElementById("status-msg").innerText = "CONNECTING TO " + host + " (WSS)...";
            document.getElementById("status-msg").style.color = "#FF9900";

            client = new Paho.MQTT.Client(host, port, clientId);
            client.onConnectionLost = onConnectionLost;
            client.onMessageArrived = onMessageArrived;

            // ĐÃ THÊM useSSL: true ĐỂ QUA MẶT CHẾ ĐỘ BẢO MẬT CỦA VERCEL/GITHUB
            client.connect({
                useSSL: true,
                onSuccess: onConnect,
                onFailure: onFail
            });
        }

        function onConnect() {
            document.getElementById("status-msg").innerText = "SYSTEM ONLINE - CONNECTED VIA SECURE WEBSOCKET";
            document.getElementById("status-msg").style.color = "#00FF00";
            client.subscribe(topicSub);
        }

        function onFail(responseObject) {
            document.getElementById("status-msg").innerText = "CONNECTION FAILED: " + responseObject.errorMessage;
            document.getElementById("status-msg").style.color = "red";
        }

        function onConnectionLost(responseObject) {
            if (responseObject.errorCode !== 0) {
                document.getElementById("status-msg").innerText = "CONNECTION LOST. PLEASE RECONNECT.";
                document.getElementById("status-msg").style.color = "red";
            }
        }

        function onMessageArrived(message) {
            try {
                // In ra chữ thô để debug:
                console.log("RAW MSG RECEIVE:", message.payloadString);
                
                const payload = JSON.parse(message.payloadString);
                processSensors(payload);
            } catch (e) {
                console.error("Lỗi parse JSON:", e, " Nội dung lỗi là: ", message.payloadString);
            }
        }

        // --- HÀM XỬ LÝ LÕI (CORE LOGIC) ---
        function processSensors(data) {
            const flex1 = data.flex1 || "STRAIGHT";
            const flex2 = data.flex2 || "STRAIGHT";
            const roll = data.roll || 0;
            const pitch = data.pitch || 0;

            const f1Bent = (flex1 === "BENT");
            const f2Bent = (flex2 === "BENT");

            // 1. Cập nhật UI Cảm biến
            updateSensorUI("val-flex1", f1Bent);
            updateSensorUI("val-flex2", f2Bent);
            
            // Thay vì gán cứng (nhảy số giật cục), ta chuyển biến thành mục tiêu để vòng lặp animateNumbers tự động chạy đến
            targetRoll = roll;
            targetPitch = pitch;

            // 2. Logic "Hold 3 Seconds" để Bật/Tắt Typing Mode
            const now = Date.now();

            if (f1Bent && f2Bent) {
                if (now > cooldownUntil) {
                    if (!isHolding) {
                        isHolding = true;
                        holdStartTime = now;
                    }

                    let holdDuration = now - holdStartTime;

                    if (holdDuration >= 3000) {
                        toggleTypingMode();
                        isHolding = false;
                        document.getElementById("hold-feedback").innerText = "MODE SWITCHED!";
                        cooldownUntil = now + 2000;
                    } else {
                        document.getElementById("hold-feedback").innerText = `HOLDING TO TOGGLE... ${(holdDuration / 1000).toFixed(1)}s / 3.0s`;
                    }
                }
            } else {
                if (isHolding) {
                    isHolding = false;
                    document.getElementById("hold-feedback").innerText = "HOLD CANCELED";
                    setTimeout(() => {
                        if (!isHolding) document.getElementById("hold-feedback").innerText = "";
                    }, 1000);
                }
            }

            // 3. Logic Đánh chữ (Chỉ chạy khi Typing Mode bật)
            if (isTypingMode) {
                let clampedRoll = Math.max(-60, Math.min(60, roll));
                let normalized = (clampedRoll + 60) / 120;
                let charIndex = Math.floor(normalized * 26.99);

                currentLetter = alphabet[charIndex];
                document.getElementById("selected-letter").innerText = currentLetter;

                if (f1Bent && !f2Bent) {
                    if (now - lastTypeTime > 600) {
                        lastTypeTime = now;
                        let outBox = document.getElementById("text-output");
                        let letterToAdd = currentLetter === '_' ? ' ' : currentLetter;
                        outBox.innerText += letterToAdd;

                        document.getElementById("selected-letter").style.transform = "scale(0.8)";
                        setTimeout(() => {
                            document.getElementById("selected-letter").style.transform = "scale(1)";
                        }, 100);
                    }
                }
            }
        }

        // Cập nhật đổi màu trạng thái Flex
        function updateSensorUI(elementId, isBent) {
            let el = document.getElementById(elementId);
            if (isBent) {
                el.innerText = "BENT";
                el.className = "sensor-val state-bent";
            } else {
                el.innerText = "STRAIGHT";
                el.className = "sensor-val state-straight";
            }
        }

        function toggleTypingMode() {
            isTypingMode = !isTypingMode;
            let indicator = document.getElementById("mode-indicator");
            let letterBox = document.getElementById("selected-letter");

            if (isTypingMode) {
                indicator.innerText = "TYPING MODE: ACTIVE";
                indicator.className = "mode-active";
                letterBox.className = "letter-active";
            } else {
                indicator.innerText = "TYPING MODE: OFF";
                indicator.className = "";
                letterBox.className = "";
                letterBox.innerText = "_";
            }
        }
    </script>
</body>

</html>
